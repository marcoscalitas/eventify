<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; margin: 0; padding: 0; }
        .email-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; }
        .email-header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 2rem; text-align: center; }
        .email-header h1 { margin: 0; font-size: 1.5rem; }
        .email-body { padding: 2rem; color: #374151; line-height: 1.6; }
        .email-body p { margin: 0 0 1rem; }
        .btn { display: inline-block; background: #4f46e5; color: white; text-decoration: none; padding: 0.75rem 2rem; border-radius: 8px; font-weight: 600; }
        .email-footer { padding: 1.5rem 2rem; text-align: center; color: #6b7280; font-size: 0.85rem; border-top: 1px solid #e5e7eb; }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1>🎫 Eventify</h1>
        </div>
        <div class="email-body">
            <p>Hello {{ username }},</p>
            <h2 style="color: #111827; margin: 0 0 0.5rem;">{{ title }}</h2>
            <p>{{ message }}</p>
            {% if link %}
            <p style="text-align: center; margin: 2rem 0;">
                <a href="{{ link }}" class="btn">View Details</a>
            </p>
            {% endif %}
        </div>
        <div class="email-footer">
            <p>&copy; 2026 Eventify — CS50W Capstone Project</p>
        </div>
    </div>
</body>
</html>
