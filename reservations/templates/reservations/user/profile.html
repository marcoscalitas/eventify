{% extends "reservations/layout.html" %}

{% block title %}My Profile — Eventify{% endblock %}

{% block body %}
<div class="form-container">
    <h2>My Profile</h2>
    <form id="profileForm" method="post" action="{% url 'profile' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}">
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}">
            </div>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ user.email }}">
        </div>
        <div class="form-group">
            <label for="avatar">Avatar</label>
            {% if user_profile.avatar %}
                <div class="avatar-preview">
                    <img src="{{ user_profile.avatar.url }}" alt="Current avatar" class="profile-avatar-small">
                </div>
            {% endif %}
            <input type="file" id="avatar" name="avatar" accept="image/*">
        </div>
        <div class="form-group">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself...">{{ user_profile.bio }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}

{% block script %}
<script>
new JustValidate('#profileForm', { errorLabelCssClass: ['field-error'] })
    .addField('#email', [
        { rule: 'email', errorMessage: 'Enter a valid email.' },
    ])
    .addField('#avatar', [
        {
            validator: () => {
                const input = document.getElementById('avatar');
                if (!input.files || !input.files.length) return true;
                const file = input.files[0];
                const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
                return allowed.includes(file.type);
            },
            errorMessage: 'Allowed: JPG, PNG, GIF, WebP.',
        },
        {
            validator: () => {
                const input = document.getElementById('avatar');
                if (!input.files || !input.files.length) return true;
                return input.files[0].size <= 5 * 1024 * 1024;
            },
            errorMessage: 'File must be smaller than 5MB.',
        },
    ]);
</script>
{% endblock %}
