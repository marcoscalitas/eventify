{% extends "reservations/layout.html" %}

{% block title %}My Profile — Eventify{% endblock %}

{% block body %}
<div class="form-container">
    <h2>My Profile</h2>
    <form method="post" action="{% url 'profile' %}">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}">
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}">
            </div>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ user.email }}">
        </div>
        <div class="form-group">
            <label for="avatar_url">Avatar URL</label>
            <input type="url" id="avatar_url" name="avatar_url" value="{{ user_profile.avatar_url }}" placeholder="https://...">
        </div>
        <div class="form-group">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself...">{{ user_profile.bio }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}
