{% extends "reservations/layout.html" %}
{% load static %}

{% block title %}Eventify — Discover Events{% endblock %}

{% block body %}
<section class="hero">
    <h1>Discover & Reserve Events</h1>
    <p>Find upcoming events, reserve your spot, and manage your bookings.</p>
</section>

<section class="filters">
    <input type="text" id="searchInput" placeholder="Search events..." class="search-input">
    <select id="categoryFilter" class="category-select">
        <option value="">All Categories</option>
        {% for category in categories %}
            <option value="{{ category.name }}">{{ category.name }}</option>
        {% endfor %}
    </select>
</section>

<section class="events-grid" id="eventsGrid">
    <div class="loading">Loading events...</div>
</section>

<div class="pagination" id="pagination"></div>
{% endblock %}

{% block script %}
<script src="{% static 'reservations/index.js' %}"></script>
{% endblock %}
