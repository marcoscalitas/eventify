{% extends "reservations/layout.html" %}

{% block title %}Email Sent — Eventify{% endblock %}

{% block body %}
<div class="auth-container">
    <div class="success-icon">✉️</div>
    <h2>Check Your Email</h2>
    <p class="auth-subtitle">
        If an account exists with the email you entered, we've sent a password reset link.
        Please check your inbox and spam folder.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-block">Back to Login</a>
</div>
{% endblock %}
