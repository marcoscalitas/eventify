{% extends "reservations/layout.html" %}

{% block title %}Login — Eventify{% endblock %}

{% block body %}
<div class="auth-container">
    <h2>Login</h2>
    {% if message %}
        <div class="alert alert-error">{{ message }}</div>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <p class="auth-forgot"><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
    <p class="auth-switch">Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
</div>
{% endblock %}
