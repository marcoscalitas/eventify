{% extends "reservations/layout.html" %}

{% block title %}Login — Eventify{% endblock %}

{% block body %}
<div class="auth-container">
    <h2>Login</h2>
    {% if message %}
        <div class="alert alert-error">{{ message }}</div>
    {% endif %}
    <form id="loginForm" method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <p class="auth-forgot"><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
    <p class="auth-switch">Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
</div>
{% endblock %}

{% block script %}
<script>
new JustValidate('#loginForm', { errorLabelCssClass: ['field-error'] })
    .addField('#username', [{ rule: 'required', errorMessage: 'Username is required.' }])
    .addField('#password', [{ rule: 'required', errorMessage: 'Password is required.' }]);
</script>
{% endblock %}
